name: Java CI

on:
  push:
    branches:
      - master
      - main
      - feature/sonarcloud

  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build do projeto com Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build, Test and Generate JaCoCo Report
        run: ./mvnw -B clean verify

      # Troca apenas para executar o Sonar
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=marcelo-bellato_API-Rest \
            -Dsonar.organization=marcelo-bellato \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}